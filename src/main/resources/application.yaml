spring:
  application:
    name: Spring Boot Annotations Guide

  # ──────────────────────────────────────────────
  # Chapter 4 ─ Spring Data JPA Configuration
  # Using H2 in-memory database for examples
  # ──────────────────────────────────────────────
  datasource:
    url: jdbc:h2:mem:annotationsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true          # Visit http://localhost:8080/h2-console
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop  # Auto-create schema on startup, drop on exit
    show-sql: true           # Print SQL statements to console
    properties:
      hibernate:
        format_sql: true     # Pretty-print SQL

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
